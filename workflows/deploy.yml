name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # 메인 브랜치에 푸시될 때 실행

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - run: npm run build # 여기서 태양님의 코드가 배포용 파일로 변환됩니다.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # 빌드된 결과물 폴더

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4